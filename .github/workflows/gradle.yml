# Automatically build the project and run any configured tests for every push
# and submitted pull request. This can help catch issues that only occur on
# certain platforms or Java versions, and provides a first line of defence
# against bad commits.

name: build
on: [pull_request, push]

jobs:
  build:
    strategy:
      matrix:
        version: [
          1.16.5-fabric, 1.16.5-forge,
          1.18.2-fabric, 1.18.2-forge,
          1.19.2-fabric, 1.19.2-forge,
          1.20.1-fabric, 1.20.1-forge,
          1.21.1-fabric, 1.21.1-neoforge
        ]
        # Use these Java versions
        java: [
          21,    # Current Java LTS & minimum supported by Minecraft
        ]
        # and run on both Linux and Windows
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: validate gradle wrapper
        uses: gradle/wrapper-validation-action@v3
      - name: setup jdk ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        run: ./gradlew ${{ matrix.version }}:build --no-daemon
      - name: capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.version }}
          path: versions/${{ matrix.version }}/build/libs/*.jar
