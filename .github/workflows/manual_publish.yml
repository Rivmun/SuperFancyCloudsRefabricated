name: Manual Publish

on:
  workflow_dispatch:
    inputs:
      # 修正：改用string类型，让用户输入逗号分隔的版本列表
      mc_versions:
        description: 'input subproject name'
        required: true
        type: string
        default: '1.16.5-fabric, 1.16.5-forge'

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.set-matrix.outputs.versions }}
    steps:
      - id: set-matrix
        run: |
          VERSIONS='["'$(echo '${{ github.event.inputs.mc_versions }}' | sed 's/,/","/g')'"]'
          echo "versions=$VERSIONS" >> $GITHUB_OUTPUT
          echo "Ready to release：$VERSIONS"

  release:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ${{ fromJson(needs.prepare-matrix.outputs.versions) }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - uses: burrunan/gradle-cache-action@v1
        with:
          gradle-distribution-sha-256-sum-warning: false

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          cache: gradle
          java-version: 21

      - run: chmod +x gradlew

      - name: Get version from gradle.properties
        id: get_version
        run: |
          VERSION=$(grep "^mod.version=" gradle.properties | cut -d'=' -f2)
          if [ -z "$VERSION" ]; then
            VERSION=$(grep "^mod_version=" gradle.properties | cut -d'=' -f2)
          fi
          if [ -z "$VERSION" ]; then
            VERSION=$(grep "^version=" gradle.properties | cut -d'=' -f2)
          fi
          if [ -z "$VERSION" ]; then
            echo "Version not found in gradle.properties"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Build ${{ matrix.version }}
        run: ./gradlew ${{ matrix.version }}:build --no-daemon

      - name: Publish to Modrinth & CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: Hoop89kN
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: 820317
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          github-enabled: false
          files: versions/${{ matrix.version }}/build/libs/*.jar
          name: ${{ steps.get_version.outputs.version }} for ${{ matrix.version }}
          version: ${{ steps.get_version.outputs.version }}+${{ matrix.version }}
          changelog-file: CHANGELOG.md
