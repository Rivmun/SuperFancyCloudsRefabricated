modLoader = "javafml"
loaderVersion = "[${forge_min_version},)"
issueTrackerURL = "${mod_issues}"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${version}"
displayName = "${mod_name}"
authors = "${mod_author}"
credits = "${mod_contributor}"
description = '''${mod_description}'''
logoFile = "${mod_icon}"

[[dependencies.${mod_id}]]
modId = "forge"
mandatory = true
versionRange = "[${forge_min_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
mandatory = true
versionRange = "${version_range_forge}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "architectury"
mandatory = true
versionRange = "[${arch-api},)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "cloth_config"
mandatory = false
versionRange = "[${cloth},)"
ordering = "AFTER"
side = "CLIENT"

[[denpendencies.${mod_id}]]
modId = "distanthorizons"
mandatory = false
versionRange = "[${distanthorizons_min_version},)"
ordering = "NONE"
side = "CLIENT"

[[denpendencies.${mod_id}]]
modId = "particlerain"
mandatory = false
versionRange = "[${particlerain_min_version},)"
ordering = "NONE"
side = "CLIENT"

[[denpendencies.${mod_id}]]
