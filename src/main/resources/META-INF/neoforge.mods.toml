modLoader="javafml"
loaderVersion="[3.0,)"
license="${mod_license}"
issueTrackerURL="${mod_issues}"

[[mixins]]
config="${mod_id}.mixins.json"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="${mod_homepage}"
logoFile="${mod_icon}"
credits="${mod_contributor}"
authors="${mod_author}"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neoforge_min_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="architectury"
type="optional"
versionRange="[${arch_api},)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="cloth_config"
type="optional"
versionRange="[${cloth},)"
ordering="AFTER"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="distanthorizons"
type="optional"
versionRange="[${distanthorizons_min_version},)"
ordering="NONE"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="particlerain"
type="optional"
versionRange="[${particlerain_min_version},)"
ordering="NONE"
side="CLIENT"
